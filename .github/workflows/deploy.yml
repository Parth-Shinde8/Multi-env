deploy-prod:
needs: build
if: github.ref == 'refs/heads/main'
runs-on: ubuntu-latest

```
steps:
  - name: Deploy to Prod (Blue-Green + Auto Rollback)
    uses: appleboy/ssh-action@v1.0.0
    with:
      host: ${{ secrets.EC2_IP }}
      username: ubuntu
      key: ${{ secrets.EC2_SSH_KEY }}
      script: |
        cd ~/devops-chart

        echo "🚀 Deploying GREEN version"

        sed -i 's/tag:.*/tag: "${{ needs.build.outputs.image_tag }}"/' values-prod.yaml
        sed -i 's/color:.*/color: green/' values-prod.yaml
        helm upgrade prod-green . -n prod -f values-prod.yaml

        echo "⏳ Waiting for pods..."
        sleep 20

        SERVICE_IP=$(kubectl get svc prod-service -n prod -o jsonpath='{.spec.clusterIP}')

        echo "🔍 Running health check..."
        curl -f http://$SERVICE_IP:3000 || FAILED=true

        if [ "$FAILED" = true ]; then
          echo "❌ Health check failed → Rolling back to BLUE"

          kubectl patch svc prod-service -n prod --type='json' -p='[
            {
              "op": "replace",
              "path": "/spec/selector",
              "value": {
                "app.kubernetes.io/name": "devops-chart",
                "app.kubernetes.io/instance": "prod-blue",
                "color": "blue"
              }
            }
          ]'

          exit 1
        else
          echo "✅ Health check passed → Switching to GREEN"

          kubectl patch svc prod-service -n prod --type='json' -p='[
            {
              "op": "replace",
              "path": "/spec/selector",
              "value": {
                "app.kubernetes.io/name": "devops-chart",
                "app.kubernetes.io/instance": "prod-green",
                "color": "green"
              }
            }
          ]'
        fi
```

   