name: Multi-Env DevOps Pipeline

on:
push:
branches:
- dev
- staging
- main

env:
AWS_REGION: ap-south-1
ECR_REPOSITORY: devops-platform-app
ECR_REGISTRY: 836479503728.dkr.ecr.ap-south-1.amazonaws.com

jobs:
build:
runs-on: ubuntu-latest

```
outputs:
  image_tag: ${{ steps.meta.outputs.tag }}

steps:
  - name: Checkout Code
    uses: actions/checkout@v3

  - name: Generate Image Tag
    id: meta
    run: |
      TAG="v${{ github.run_number }}-${{ github.sha }}"
      echo "tag=$TAG" >> $GITHUB_OUTPUT

  - name: Configure AWS Credentials
    uses: aws-actions/configure-aws-credentials@v3
    with:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-region: ${{ env.AWS_REGION }}

  - name: Login to ECR
    run: |
      aws ecr get-login-password --region $AWS_REGION | \
      docker login --username AWS --password-stdin $ECR_REGISTRY

  - name: Build Image
    run: |
      docker build -t $ECR_REPOSITORY:${{ steps.meta.outputs.tag }} ./app

  - name: Tag Image
    run: |
      docker tag $ECR_REPOSITORY:${{ steps.meta.outputs.tag }} \
      $ECR_REGISTRY/$ECR_REPOSITORY:${{ steps.meta.outputs.tag }}

  - name: Push Image
    run: |
      docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ steps.meta.outputs.tag }}
```

deploy-dev:
needs: build
if: github.ref == 'refs/heads/dev'
runs-on: ubuntu-latest

```
steps:
  - name: Deploy to Dev
    uses: appleboy/ssh-action@v1.0.0
    with:
      host: ${{ secrets.EC2_IP }}
      username: ubuntu
      key: ${{ secrets.EC2_SSH_KEY }}
      script: |
        cd ~/devops-chart
        sed -i 's/tag:.*/tag: "${{ needs.build.outputs.image_tag }}"/' values-dev.yaml
        helm upgrade dev-release . -n dev -f values-dev.yaml
```

