name: Multi-Env DevOps Pipeline

on:
  push:
    branches:
      - dev
      - staging
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: devops-platform-app
  ECR_REGISTRY: 836479503728.dkr.ecr.ap-south-1.amazonaws.com

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Build Image
        run: |
          docker build -t $ECR_REPOSITORY:${{ github.sha }} ./app

      - name: Tag Image
        run: |
          docker tag $ECR_REPOSITORY:${{ github.sha }} \
          $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

      - name: Push Image
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

  deploy-dev:
    needs: build
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Dev
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/devops-chart
            sed -i 's/tag:.*/tag: "${{ github.sha }}"/' values-dev.yaml
            helm upgrade dev-release . -n dev -f values-dev.yaml

  deploy-staging:
    needs: build
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Staging
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/devops-chart
            sed -i 's/tag:.*/tag: "${{ github.sha }}"/' values-staging.yaml
            helm upgrade staging-release . -n staging -f values-staging.yaml

  deploy-prod:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Prod (Blue-Green)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/devops-chart

            # Deploy green version
            sed -i 's/tag:.*/tag: "${{ github.sha }}"/' values-prod.yaml
            sed -i 's/color:.*/color: green/' values-prod.yaml
            helm upgrade prod-green . -n prod -f values-prod.yaml

            # Switch traffic to green
            kubectl patch svc prod-service -n prod --type='json' -p='[
              {
                "op": "replace",
                "path": "/spec/selector",
                "value": {
                  "app.kubernetes.io/name": "devops-chart",
                  "app.kubernetes.io/instance": "prod-green",
                  "color": "green"
                }
              }
            ]'